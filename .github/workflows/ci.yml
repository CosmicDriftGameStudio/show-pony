# CI for show-pony.
#
# show-pony is a PUBLIC repo, so it can't call the private cosmicdriftgamestudio/
# infra reusable workflows (GitHub blocks public→private reusable calls) and
# must not use the self-hosted cdgs-runner. So this workflow is self-contained
# and runs entirely on GitHub-hosted runners.
#
# It builds and pushes the image; the cluster (namespace, ingress, DNS,
# deployment, schema-apply) is owned by Pulumi — no deploy step, no cluster
# credentials live here.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  HUSKY: "0"

jobs:
  # lint + typecheck + schema/boot validate + unit tests. PR-only gate.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - run: bun run typecheck
      # Static gate: fails if entity defs are ahead of kumiko/migrations or
      # validateBoot rejects the composed features.
      - run: bun kumiko-schema validate
      - run: bun run lint
      - name: HTML-Escape guard
        env:
          KUMIKO_GUARD_ROOTS: show-pony
        run: bun kumiko-guard-html-escape
      - name: No-Date-API guard
        env:
          KUMIKO_GUARD_ROOTS: show-pony
        run: bun kumiko-guard-no-date-api
      - name: Silent-Skip guard
        env:
          KUMIKO_GUARD_ROOTS: show-pony
        run: bun kumiko-guard-silent-skip
      - name: UI guards
        env:
          KUMIKO_GUARD_ROOTS: show-pony
        run: bun kumiko-guard-ui
      - run: |
          ulimit -n 65536 || true
          bun --config=bunfig.ci.toml test --dots

  # Integration tests against real Postgres + Redis. PR-only, non-blocking gate.
  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - name: Start services
        run: |
          docker rm -f sp-ci-pg sp-ci-redis 2>/dev/null || true
          # Docker Hub pulls from GitHub-hosted runners time out intermittently —
          # pull with retries before running, so a transient hiccup doesn't fail CI.
          for img in postgres:18.3-alpine redis:7-alpine; do
            for attempt in 1 2 3 4 5; do
              docker pull "$img" && break || { echo "pull $img failed (attempt $attempt), retrying"; sleep 10; }
            done
          done
          docker run -d --name sp-ci-pg -p 15432:5432 \
            -e POSTGRES_USER=kumiko -e POSTGRES_PASSWORD=kumiko -e POSTGRES_DB=kumiko_dev \
            --health-cmd="pg_isready -U kumiko -d kumiko_dev" \
            --health-interval=2s --health-timeout=3s --health-retries=30 \
            postgres:18.3-alpine
          docker run -d --name sp-ci-redis -p 16379:6379 redis:7-alpine
          for i in $(seq 1 60); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' sp-ci-pg 2>/dev/null)" = healthy ] && break
            sleep 2
          done
          if [ "$(docker inspect -f '{{.State.Health.Status}}' sp-ci-pg)" != healthy ]; then
            docker logs sp-ci-pg
            exit 1
          fi
          docker exec sp-ci-pg psql -U kumiko -d kumiko_dev -c "CREATE DATABASE kumiko_test;" || true
      - name: Run integration tests
        env:
          NODE_ENV: test
          KUMIKO_INSTANCE_ID: test-instance
          DATABASE_URL: postgresql://kumiko:kumiko@localhost:15432/kumiko_dev
          TEST_DATABASE_URL: postgresql://kumiko:kumiko@localhost:15432/kumiko_test
          REDIS_URL: redis://localhost:16379
          JWT_SECRET: test-jwt-secret-at-least-32-characters-long
        run: bun run test:integration:ci
      - name: Stop services
        if: always()
        run: docker rm -f sp-ci-pg sp-ci-redis || true

  # Build + push the arm64 image to GHCR on merge to main. Native arm64 on a
  # GitHub-hosted runner (cluster nodes are arm64) — no QEMU, no self-hosted
  # runner. GITHUB_TOKEN is enough: the package's origin is this repo.
  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/cosmicdriftgamestudio/show-pony
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
          build-args: |
            BUILD_VERSION=${{ github.sha }}



